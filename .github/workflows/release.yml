name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            artifact_name: macOS-apple-silicon
            os: macos-15
            target: aarch64-apple-darwin
            asset_arch: aarch64
            updater_platform: darwin-aarch64
            args: --target aarch64-apple-darwin
          - name: macOS (Intel)
            artifact_name: macOS-intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            asset_arch: x64
            updater_platform: darwin-x86_64
            args: --target x86_64-apple-darwin
          - name: Linux (x64)
            artifact_name: Linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            updater_platform: linux-x86_64
            args: --target x86_64-unknown-linux-gnu
          - name: Windows (x64)
            artifact_name: Windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            updater_platform: windows-x86_64
            args: --target x86_64-pc-windows-msvc

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and bundle app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Repack macOS DMG with repair helper
        if: startsWith(matrix.os, 'macos-')
        id: repack_macos_dmg
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          APP_PATH="$(find "src-tauri/target/${{ matrix.target }}/release/bundle" -type d -name 'NeoRDM.app' | head -n 1)"

          if [[ -z "${APP_PATH}" ]]; then
            echo "NeoRDM.app not found in bundle output" >&2
            exit 1
          fi

          OUTPUT_DMG="src-tauri/target/${{ matrix.target }}/release/bundle/dmg/NeoRDM_${VERSION}_${{ matrix.asset_arch }}.dmg"

          bash scripts/macos/repack-dmg-with-fix.sh \
            "${APP_PATH}" \
            "${OUTPUT_DMG}" \
            "NeoRDM"

          echo "dmg_path=${OUTPUT_DMG}" >> "${GITHUB_OUTPUT}"

      - name: Normalize artifact paths
        id: artifact_paths
        shell: bash
        env:
          ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
          CUSTOM_DMG_PATH: ${{ steps.repack_macos_dmg.outputs.dmg_path }}
          BUNDLE_ROOT: src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          function addArtifactPath(artifactPaths, artifactPath) {
            if (!artifactPath) {
              return;
            }

            if (artifactPath.endsWith('/latest.json') || artifactPath.endsWith('\\latest.json')) {
              return;
            }

            try {
              if (!fs.statSync(artifactPath).isFile()) {
                return;
              }
            } catch {
              return;
            }

            if (!artifactPaths.includes(artifactPath)) {
              artifactPaths.push(artifactPath);
            }
          }

          function walkFiles(rootDir) {
            const stack = [rootDir];
            const files = [];

            while (stack.length > 0) {
              const currentDir = stack.pop();
              if (!currentDir || !fs.existsSync(currentDir)) {
                continue;
              }

              for (const entry of fs.readdirSync(currentDir, { withFileTypes: true })) {
                const fullPath = path.join(currentDir, entry.name);

                if (entry.isDirectory()) {
                  stack.push(fullPath);
                  continue;
                }

                if (entry.isFile()) {
                  files.push(fullPath);
                }
              }
            }

            return files;
          }

          const customDmgPath = process.env.CUSTOM_DMG_PATH || '';
          const bundleRoot = process.env.BUNDLE_ROOT || '';
          const artifactPaths = [];

          for (const artifactPath of JSON.parse(process.env.ARTIFACT_PATHS_JSON || '[]')) {
            if (customDmgPath && artifactPath.endsWith('.dmg')) {
              continue;
            }

            addArtifactPath(artifactPaths, artifactPath);
          }

          for (const bundleFile of walkFiles(bundleRoot)) {
            if (!bundleFile.endsWith('.sig')) {
              continue;
            }

            addArtifactPath(artifactPaths, bundleFile);
            addArtifactPath(artifactPaths, bundleFile.slice(0, -4));
          }

          if (customDmgPath) {
            addArtifactPath(artifactPaths, customDmgPath);
          }

          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `paths<<__PATHS__\n${artifactPaths.join('\n')}\n__PATHS__\n`);
          EOF

      - name: Create updater metadata
        shell: bash
        env:
          ARTIFACT_PATHS_RAW: ${{ steps.artifact_paths.outputs.paths }}
          UPDATER_PLATFORM: ${{ matrix.updater_platform }}
        run: |
          set -euo pipefail

          artifact_paths=()
          while IFS= read -r artifact_path; do
            artifact_paths+=("${artifact_path}")
          done <<< "${ARTIFACT_PATHS_RAW}"
          sig_path=""
          preferred_patterns=()

          case "${UPDATER_PLATFORM}" in
            darwin-*)
              preferred_patterns=('*.app.tar.gz.sig')
              ;;
            linux-*)
              preferred_patterns=('*.AppImage.tar.gz.sig' '*.tar.gz.sig')
              ;;
            windows-*)
              preferred_patterns=('*setup.exe.sig' '*.msi.sig' '*nsis*.zip.sig' '*msi*.zip.sig' '*.exe.sig' '*.zip.sig')
              ;;
          esac

          for pattern in "${preferred_patterns[@]}"; do
            for artifact_path in "${artifact_paths[@]}"; do
              [[ -z "${artifact_path}" ]] && continue

              if [[ "${artifact_path}" == ${pattern} ]]; then
                sig_path="${artifact_path}"
                break 2
              fi
            done
          done

          for artifact_path in "${artifact_paths[@]}"; do
            [[ -z "${artifact_path}" ]] && continue

            if [[ "${artifact_path}" == *.sig ]]; then
              sig_path="${artifact_path}"
              break
            fi
          done

          if [[ -z "${sig_path}" || ! -f "${sig_path%.sig}" ]]; then
            echo "No updater signature artifact found for ${{ matrix.name }}" >&2
            exit 1
          fi

          bundle_path="${sig_path%.sig}"

          cat > release-metadata.json <<EOF
          {
            "updaterPlatform": "${UPDATER_PLATFORM}",
            "bundleName": "$(basename "${bundle_path}")",
            "signatureName": "$(basename "${sig_path}")"
          }
          EOF

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        if: steps.artifact_paths.outputs.paths != ''
        with:
          name: NeoRDM-${{ matrix.artifact_name }}-bundles
          path: |
            ${{ steps.artifact_paths.outputs.paths }}
            release-metadata.json
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Determine changelog range
        id: changelog_range
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            echo "from_ref=${PREVIOUS_TAG}" >> "${GITHUB_OUTPUT}"
          else
            FIRST_COMMIT="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            echo "from_ref=${FIRST_COMMIT}" >> "${GITHUB_OUTPUT}"
          fi

          echo "to_ref=${CURRENT_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Generate release changelog
        shell: bash
        run: |
          set -euo pipefail

          npx changelogen@latest \
            --from "${{ steps.changelog_range.outputs.from_ref }}" \
            --to "${{ steps.changelog_range.outputs.to_ref }}" \
            --no-output \
            > release-notes.md

      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: NeoRDM-*-bundles
          path: release-assets

      - name: Generate updater manifest
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          function findFileByBasename(rootDir, fileName) {
            const stack = [rootDir];

            while (stack.length > 0) {
              const currentDir = stack.pop();
              if (!currentDir || !fs.existsSync(currentDir)) {
                continue;
              }

              for (const entry of fs.readdirSync(currentDir, { withFileTypes: true })) {
                const fullPath = path.join(currentDir, entry.name);

                if (entry.isDirectory()) {
                  stack.push(fullPath);
                  continue;
                }

                if (entry.isFile() && entry.name === fileName) {
                  return fullPath;
                }
              }
            }

            return null;
          }

          const root = 'release-assets';
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const notes = fs.readFileSync('release-notes.md', 'utf8').trim();
          const artifactDirs = fs
            .readdirSync(root, { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => path.join(root, entry.name));

          const platforms = {};

          for (const artifactDir of artifactDirs) {
            const metadataPath = path.join(artifactDir, 'release-metadata.json');
            if (!fs.existsSync(metadataPath)) {
              continue;
            }

            const metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
            const bundlePath = findFileByBasename(artifactDir, metadata.bundleName);
            const signaturePath = findFileByBasename(artifactDir, metadata.signatureName);

            if (!bundlePath || !fs.existsSync(bundlePath)) {
              throw new Error(`Missing updater bundle: ${metadata.bundleName} in ${artifactDir}`);
            }

            if (!signaturePath || !fs.existsSync(signaturePath)) {
              throw new Error(`Missing updater signature: ${metadata.signatureName} in ${artifactDir}`);
            }

            platforms[metadata.updaterPlatform] = {
              signature: fs.readFileSync(signaturePath, 'utf8').trim(),
              url: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/latest/download/${metadata.bundleName}`,
            };
          }

          if (Object.keys(platforms).length === 0) {
            throw new Error('No updater platforms were collected from workflow artifacts.');
          }

          const manifest = {
            version,
            notes,
            pub_date: new Date().toISOString(),
            platforms,
          };

          fs.writeFileSync(
            path.join(root, 'latest.json'),
            JSON.stringify(manifest, null, 2) + '\n'
          );
          EOF

      - name: Collect release files
        id: release_files
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f ! -name 'release-metadata.json' | sort > release-files.txt

          {
            echo 'paths<<__FILES__'
            cat release-files.txt
            echo '__FILES__'
          } >> "${GITHUB_OUTPUT}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeoRDM ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: ${{ steps.release_files.outputs.paths }}
