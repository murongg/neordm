name: Build Tauri Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            artifact_name: macOS-apple-silicon
            os: macos-15
            target: aarch64-apple-darwin
            asset_arch: aarch64
            args: --target aarch64-apple-darwin --no-sign
          - name: macOS (Intel)
            artifact_name: macOS-intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            asset_arch: x64
            args: --target x86_64-apple-darwin --no-sign
          - name: Linux (x64)
            artifact_name: Linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
          - name: Windows (x64)
            artifact_name: Windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --no-sign

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and bundle app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0.6.0
        with:
          args: ${{ matrix.args }}

      - name: Repack macOS DMG with repair helper
        if: startsWith(matrix.os, 'macos-')
        id: repack_macos_dmg
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          APP_PATH="$(find "src-tauri/target/${{ matrix.target }}/release/bundle" -type d -name 'NeoRDM.app' | head -n 1)"

          if [[ -z "${APP_PATH}" ]]; then
            echo "NeoRDM.app not found in bundle output" >&2
            exit 1
          fi

          OUTPUT_DMG="src-tauri/target/${{ matrix.target }}/release/bundle/dmg/NeoRDM_${VERSION}_${{ matrix.asset_arch }}.dmg"

          bash scripts/macos/repack-dmg-with-fix.sh \
            "${APP_PATH}" \
            "${OUTPUT_DMG}" \
            "NeoRDM"

          echo "dmg_path=${OUTPUT_DMG}" >> "${GITHUB_OUTPUT}"

      - name: Normalize artifact paths
        id: artifact_paths
        shell: bash
        env:
          ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
          CUSTOM_DMG_PATH: ${{ steps.repack_macos_dmg.outputs.dmg_path }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const customDmgPath = process.env.CUSTOM_DMG_PATH || '';
          const artifactPaths = JSON.parse(process.env.ARTIFACT_PATHS_JSON || '[]')
            .filter((artifactPath) => !(customDmgPath && artifactPath.endsWith('.dmg')))
            .filter((artifactPath) => {
              try {
                return fs.statSync(artifactPath).isFile();
              } catch {
                return false;
              }
            });

          if (customDmgPath) {
            artifactPaths.push(customDmgPath);
          }

          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `paths<<__PATHS__\n${artifactPaths.join('\n')}\n__PATHS__\n`);
          EOF

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        if: steps.artifact_paths.outputs.paths != ''
        with:
          name: NeoRDM-${{ matrix.artifact_name }}-bundles
          path: ${{ steps.artifact_paths.outputs.paths }}
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: NeoRDM-*-bundles
          merge-multiple: true
          path: release-assets

      - name: Collect release files
        id: release_files
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f | sort > release-files.txt

          {
            echo 'paths<<__FILES__'
            cat release-files.txt
            echo '__FILES__'
          } >> "${GITHUB_OUTPUT}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeoRDM ${{ github.ref_name }}
          body: Automated build from GitHub Actions.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: ${{ steps.release_files.outputs.paths }}
